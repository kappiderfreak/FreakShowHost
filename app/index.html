    <!-- Kein Referer aus dem Overlay senden -> verhaelt sich wie eine OBS-Browserquelle.
         Streamlabs & Co. liefern sonst 404, wenn ein fremder Referer (127.0.0.1:<Port>)
         mitgeschickt wird. Gilt fuer die Seite UND alle eingebetteten iframes. -->
    <meta name="referrer" content="no-referrer" />
    <style>html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }</style>

    <script>
        // Modules load after this point. Keep their event listeners until the
        // Streamer.bot client has finished loading from the network.
        (function () {
            var queuedListeners = [];
            var queuedSubscriptions = [];
            var queuedClient = {
                on: function (eventName, handler) {
                    if (typeof handler === 'function') {
                        queuedListeners.push({ eventName: eventName, handler: handler });
                    }
                    return queuedClient;
                },
                subscribe: function (events) {
                    queuedSubscriptions.push(events);
                    return true;
                }
            };

            window.client = queuedClient;
            window.__KAPPI_ATTACH_STREAMERBOT_CLIENT__ = function (realClient) {
                var i;
                for (i = 0; i < queuedListeners.length; i++) {
                    realClient.on(queuedListeners[i].eventName, queuedListeners[i].handler);
                }
                for (i = 0; i < queuedSubscriptions.length; i++) {
                    if (typeof realClient.subscribe === 'function') {
                        realClient.subscribe(queuedSubscriptions[i]);
                    }
                }
                window.client = realClient;
                console.log('[Kappi Overlay] Streamer.bot client ready; listeners attached:', queuedListeners.length);
            };
        })();
    </script>

    <!-- DO NOT REMOVE -->
    <!-- Streamer.bot WebSocket configuration.
         Bevorzugt die LOKALE Client-Bibliothek (kein Internet noetig, LAN reicht).
         Nur wenn die fehlt: CDN-Fallback mit Wiederholversuchen, damit ein noch
         nicht bereites Internet nach dem PC-Neustart nichts dauerhaft blockiert. -->
    <script>
        (function () {
            var connectionWatchTimer = null;
            var recoveryInFlight = false;
            var disconnectedSince = 0;
            var WATCH_INTERVAL_MS = 4000;
            var RECOVERY_AFTER_MS = 8000;
            var CONNECTING_STALE_MS = 15000;

            // Die Streamer.bot-Bibliothek verbindet sich normalerweise selbst neu.
            // Beim sehr fruehen Windows-Autostart kann der erste LAN-Versuch aber
            // ohne verwertbares close-Ereignis haengen bleiben. Dieser unabhaengige
            // Waechter greift nur ein, wenn der Socket wirklich laenger getrennt ist.
            function startConnectionWatch(client) {
                if (connectionWatchTimer) clearInterval(connectionWatchTimer);
                disconnectedSince = Date.now();

                function watchConnection() {
                    if (!client || window.client !== client || typeof client.connect !== 'function') return;
                    var socket = client.socket;
                    var state = socket ? socket.readyState : 3;
                    var now = Date.now();

                    if (state === 1) {
                        disconnectedSince = 0;
                        recoveryInFlight = false;
                        return;
                    }
                    if (!disconnectedSince) disconnectedSince = now;
                    if (recoveryInFlight || state === 2) return;
                    if (state === 0 && now - disconnectedSince < CONNECTING_STALE_MS) return;
                    if (now - disconnectedSince < RECOVERY_AFTER_MS) return;

                    recoveryInFlight = true;
                    console.warn('[Kappi Overlay] Streamer.bot weiterhin getrennt; erneuter LAN-Verbindungsversuch.');
                    Promise.resolve(client.connect(8000)).then(function () {
                        console.log('[Kappi Overlay] Streamer.bot-Wiederverbindung erfolgreich.');
                    }, function (err) {
                        console.warn('[Kappi Overlay] Streamer.bot noch nicht erreichbar; Waechter versucht es erneut.', err);
                    }).then(function () {
                        recoveryInFlight = false;
                        if (!client.socket || client.socket.readyState !== 1) disconnectedSince = Date.now();
                    });
                }

                connectionWatchTimer = setInterval(watchConnection, WATCH_INTERVAL_MS);
                setTimeout(watchConnection, WATCH_INTERVAL_MS);
            }

            function createClient(overlayConfig) {
                var streamerBotClient = new StreamerbotClient({
                    host: overlayConfig.host,
                    port: overlayConfig.port,
                    autoReconnect: true,
                    retries: -1,
                    subscribe: {
                        General: ['Custom'],
                        Twitch: ['ChatMessage', 'RewardRedemption']
                    },
                    onConnect: function () {
                        disconnectedSince = 0;
                        recoveryInFlight = false;
                        console.log('[Kappi Overlay] Streamer.bot verbunden.');
                    },
                    onDisconnect: function () {
                        if (!disconnectedSince) disconnectedSince = Date.now();
                        console.warn('[Kappi Overlay] Streamer.bot getrennt; automatische Wiederverbindung bleibt aktiv.');
                    },
                    onData: function (payload) {
                        window.__KAPPI_LAST_STREAMERBOT_PAYLOAD__ = payload;
                        console.log('[Kappi Overlay Event]', payload);
                        if (window.kappiEmoteRain && typeof window.kappiEmoteRain.handlePayload === 'function') {
                            window.kappiEmoteRain.handlePayload(payload, 'window.client onData');
                        }
                    }
                });
                window.__KAPPI_ATTACH_STREAMERBOT_CLIENT__(streamerBotClient);
                startConnectionWatch(streamerBotClient);
                console.log('[Kappi Overlay] Streamer.bot client gestartet (' + overlayConfig.host + ':' + overlayConfig.port + ')');
            }

            function startClient() {
                // Der localStorage von WebView2 (Overlay) und externem Browser
                // (Einstellungsseite) ist getrennt. Deshalb ZUERST die geteilte
                // Config von der Bridge holen - so uebernimmt das Overlay genau das,
                // was in den Einstellungen gesetzt wurde. Erst wenn dort nichts
                // konfiguriert ist, gilt der lokale Wert/Default.
                var localConfig = window.KappiOverlayConfig
                    ? window.KappiOverlayConfig.get()
                    : { host: '127.0.0.1', port: 8081 };
                if (window.KappiOverlayConfig && typeof window.KappiOverlayConfig.fetchShared === 'function') {
                    window.KappiOverlayConfig.fetchShared(function (shared) {
                        createClient(shared || localConfig);
                    });
                } else {
                    createClient(localConfig);
                }
            }

            var cdnTries = 0;
            function loadFromCdn() {
                cdnTries++;
                var s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/@streamerbot/client/dist/streamerbot-client.js?r=' + cdnTries;
                s.onload = function () {
                    if (typeof StreamerbotClient === 'function') startClient();
                };
                s.onerror = function () {
                    // Internet evtl. noch nicht bereit (PC-Neustart) -> mit Backoff neu versuchen.
                    var delay = Math.min(30000, 2000 * cdnTries);
                    console.warn('[Kappi Overlay] Streamer.bot-Client CDN fehlgeschlagen, neuer Versuch in ' + delay + 'ms');
                    setTimeout(loadFromCdn, delay);
                };
                (document.head || document.documentElement).appendChild(s);
            }

            if (typeof StreamerbotClient === 'function') {
                startClient();           // lokale Bibliothek geladen -> sofort, ohne Internet
            } else {
                loadFromCdn();           // Notfall: lokale Datei fehlt
            }
        })();
    </script>
